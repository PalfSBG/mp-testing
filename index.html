<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Footdle — Guess the Football Ground</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green:   #16a34a;
      --green-h: #15803d;
      --red:     #dc2626;
      --amber:   #d97706;
      --bg:      #0f172a;
      --surface: #1e293b;
      --border:  #334155;
      --text:    #f1f5f9;
      --muted:   #94a3b8;
      --radius:  10px;
    }
    html, body { height: 100%; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); }
    .app { display: flex; flex-direction: column; height: 100vh; }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: .75rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .logo { font-size: 1.4rem; font-weight: 800; letter-spacing: -.02em; }
    .logo span { color: var(--green); }
    .club-panel { text-align: center; flex: 1; min-width: 160px; }
    .round-label { font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
    .club-name   { font-size: 1.15rem; font-weight: 700; margin-top: .2rem; }
    .club-league { font-size: .75rem; color: var(--muted); margin-top: .1rem; }
    .score-panel { text-align: right; min-width: 80px; }
    .score-label  { font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
    .score-value  { font-size: 1.4rem; font-weight: 800; color: var(--green); }
    #map { flex: 1; cursor: crosshair; }
    .bottom-bar {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: .75rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .hint { font-size: .82rem; color: var(--muted); }
    .hint strong { color: var(--text); }
    .btn {
      padding: .55rem 1.4rem;
      border-radius: var(--radius);
      border: none;
      font-size: .9rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn:disabled { opacity: .35; cursor: not-allowed; }
    .btn-green  { background: var(--green);  color: #fff; }
    .btn-green:hover:not(:disabled)  { background: var(--green-h); }
    .btn-outline { background: transparent; color: var(--text); border: 1.5px solid var(--border); }
    .btn-outline:hover:not(:disabled) { border-color: var(--text); }
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.65);
      display: flex; align-items: center; justify-content: center;
      z-index: 2000;
      padding: 1rem;
    }
    .overlay.hidden { display: none; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem 2.25rem;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .result-emoji { font-size: 3rem; margin-bottom: .5rem; }
    .result-pts   { font-size: 2.5rem; font-weight: 900; }
    .result-pts.great  { color: var(--green); }
    .result-pts.ok     { color: var(--amber); }
    .result-pts.bad    { color: var(--red);   }
    .result-dist  { font-size: 1rem; color: var(--muted); margin: .35rem 0 1rem; }
    .result-loc   { font-size: .82rem; color: var(--muted); margin-bottom: 1.5rem; }
    .btn-row { display: flex; gap: .75rem; justify-content: center; flex-wrap: wrap; }
    .final-score { font-size: 3.5rem; font-weight: 900; color: var(--green); margin: .5rem 0; }
    .final-sub   { color: var(--muted); font-size: .9rem; margin-bottom: 1.5rem; }
    .dots { display: flex; gap: .4rem; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border); transition: background .3s; }
    .dot.done  { background: var(--green); }
    .dot.current { background: var(--amber); }
    .leaflet-container { background: #1e3a5f; }
    .result-line { stroke: #f59e0b; stroke-width: 2; stroke-dasharray: 6 4; }
    @media (max-width: 500px) {
      .club-name { font-size: 1rem; }
      .score-value { font-size: 1.1rem; }
    }
    #loading { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; gap:.75rem; }
    #loading.hidden { display:none; }
    #loading h2 { color:var(--text); font-size:1.4rem; letter-spacing:.05em; }
    #loading p { color:var(--muted); font-size:.9rem; }
    .progress-track { width:260px; height:8px; background:var(--border); border-radius:4px; overflow:hidden; }
    .progress-bar { height:100%; width:0%; background:var(--green); border-radius:4px; transition:width .4s ease; }
    #loadPct { color:var(--green); font-size:.85rem; font-weight:600; }
  </style>
</head>
<body>
<div id="loading">
  <h2>⚽ Footdle</h2>
  <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
  <span id="loadPct">0%</span>
  <p>Loading stadiums…</p>
</div>
<div class="app">
  <header>
    <div class="logo">Foot<span>dle</span></div>
    <div class="club-panel">
      <div class="round-label">Round <span id="roundNum">1</span> of <span id="totalRounds">5</span></div>
      <div class="club-name" id="clubName">Loading…</div>
      <div class="club-league" id="clubLeague"></div>
    </div>
    <div style="display:flex;align-items:center;gap:1rem;">
      <div class="dots" id="dots"></div>
      <div class="score-panel">
        <div class="score-label">Score</div>
        <div class="score-value" id="totalScore">0</div>
      </div>
    </div>
  </header>
  <div id="map"></div>
  <div class="bottom-bar">
    <div class="hint" id="hint">Click anywhere on the map to drop your pin</div>
    <div style="display:flex;gap:.75rem;">
      <button class="btn btn-outline" id="clearBtn" disabled onclick="clearPin()">Clear pin</button>
      <button class="btn btn-green"   id="submitBtn" disabled onclick="submitGuess()">Submit guess</button>
    </div>
  </div>
</div>
<div class="overlay hidden" id="resultOverlay">
  <div class="card">
    <div class="result-emoji" id="resultEmoji"></div>
    <div class="result-pts"   id="resultPts"></div>
    <div class="result-dist"  id="resultDist"></div>
    <div style="font-size:.9rem;font-weight:600;margin-bottom:.25rem;" id="clubLabel"></div>
    <div class="result-loc"   id="resultLoc"></div>
    <div class="btn-row">
      <button class="btn btn-green" id="nextBtn" onclick="nextRound()">Next club →</button>
    </div>
  </div>
</div>
<div class="overlay hidden" id="endOverlay">
  <div class="card">
    <div style="font-size:1.2rem;font-weight:700;margin-bottom:.5rem;">Game Over!</div>
    <div class="final-score" id="finalScore"></div>
    <div class="final-sub" id="finalSub"></div>
    <div class="btn-row">
      <button class="btn btn-green" onclick="restartGame()">Play again</button>
    </div>
  </div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let ALL_CLUBS = [];


const ROUNDS_PER_GAME = 5;
const MAX_SCORE_PER_ROUND = 5000;
const MAX_DIST_KM = 5000;

let map, guessMarker, answerMarker, distanceLine;
let clubs = [], currentRound = 0, totalScore = 0, guessLatLng = null;


function initMap() {
  map = L.map('map', {
    center: [20, 10],
    zoom: 2,
    minZoom: 1,
    maxBounds: [[-90, -200], [90, 200]],
    worldCopyJump: false,
  });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a>',
    maxZoom: 18,
  }).addTo(map);
  map.on('click', onMapClick);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startGame() {
  clubs = shuffle(ALL_CLUBS).slice(0, ROUNDS_PER_GAME);
  currentRound = 0;
  totalScore = 0;
  document.getElementById('totalScore').textContent = '0';
  buildDots();
  loadRound();
}

function restartGame() {
  document.getElementById('endOverlay').classList.add('hidden');
  clearMapLayers();
  startGame();
}

function buildDots() {
  const el = document.getElementById('dots');
  el.innerHTML = '';
  for (let i = 0; i < ROUNDS_PER_GAME; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' current' : '');
    d.id = `dot-${i}`;
    el.appendChild(d);
  }
}

function updateDots(roundIndex, done) {
  for (let i = 0; i < ROUNDS_PER_GAME; i++) {
    const d = document.getElementById(`dot-${i}`);
    if (i < roundIndex || (done && i === roundIndex)) d.className = 'dot done';
    else if (i === roundIndex) d.className = 'dot current';
    else d.className = 'dot';
  }
}

function loadRound() {
  clearMapLayers();
  guessLatLng = null;
  document.getElementById('submitBtn').disabled = true;
  document.getElementById('clearBtn').disabled = true;
  document.getElementById('hint').textContent = 'Click anywhere on the map to drop your pin';
  const club = clubs[currentRound];
  document.getElementById('roundNum').textContent = currentRound + 1;
  document.getElementById('totalRounds').textContent = ROUNDS_PER_GAME;
  document.getElementById('clubName').textContent = club[0];
  document.getElementById('clubLeague').textContent = club[1];
  updateDots(currentRound, false);
  map.setView([20, 10], 2);
}

const guessIcon = L.divIcon({
  className: '',
  html: `<div style="width:22px;height:22px;background:#2563eb;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.4);"></div>`,
  iconSize: [22, 22], iconAnchor: [11, 11],
});

const answerIcon = L.divIcon({
  className: '',
  html: `<div style="width:22px;height:22px;background:#16a34a;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.4);"></div>`,
  iconSize: [22, 22], iconAnchor: [11, 11],
});

function onMapClick(e) {
  guessLatLng = e.latlng;
  if (guessMarker) map.removeLayer(guessMarker);
  guessMarker = L.marker(guessLatLng, { icon: guessIcon }).addTo(map)
    .bindTooltip('Your guess', { permanent: false });
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('clearBtn').disabled = false;
  document.getElementById('hint').innerHTML = '<strong>Pin placed.</strong> Hit Submit or click again to move it.';
}

function clearPin() {
  if (guessMarker) { map.removeLayer(guessMarker); guessMarker = null; }
  guessLatLng = null;
  document.getElementById('submitBtn').disabled = true;
  document.getElementById('clearBtn').disabled = true;
  document.getElementById('hint').textContent = 'Click anywhere on the map to drop your pin';
}

function clearMapLayers() {
  [guessMarker, answerMarker, distanceLine].forEach(l => { if (l) map.removeLayer(l); });
  guessMarker = answerMarker = distanceLine = null;
}

function haversineKm(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function distToScore(km) {
  if (km <= 0)   return MAX_SCORE_PER_ROUND;
  if (km >= MAX_DIST_KM) return 0;
  return Math.round(MAX_SCORE_PER_ROUND * (1 - km / MAX_DIST_KM));
}

function formatDist(km) {
  return km < 1 ? `${Math.round(km * 1000)} m` : `${Math.round(km).toLocaleString()} km`;
}

function submitGuess() {
  if (!guessLatLng) return;
  map.off('click', onMapClick);
  const club = clubs[currentRound];
  const dist = haversineKm(guessLatLng.lat, guessLatLng.lng, club[2], club[3]);
  const pts  = distToScore(dist);
  totalScore += pts;
  const answerLL = L.latLng(club[2], club[3]);
  answerMarker = L.marker(answerLL, { icon: answerIcon }).addTo(map)
    .bindTooltip(club[0], { permanent: true, direction: 'top' });
  distanceLine = L.polyline([guessLatLng, answerLL], {
    color: '#f59e0b', weight: 2, dashArray: '6 4', opacity: .8,
  }).addTo(map);
  map.fitBounds(L.latLngBounds([guessLatLng, answerLL]).pad(.25));
  const emoji = pts >= 4000 ? '🎯' : pts >= 2500 ? '👍' : pts >= 1000 ? '😅' : '💀';
  const cls   = pts >= 3000 ? 'great' : pts >= 1200 ? 'ok' : 'bad';
  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultPts').textContent = `+${pts.toLocaleString()} pts`;
  document.getElementById('resultPts').className = `result-pts ${cls}`;
  document.getElementById('resultDist').textContent = `You were ${formatDist(dist)} away`;
  document.getElementById('clubLabel').textContent = club[0];
  document.getElementById('resultLoc').textContent = `📍 ${club[4]}`;
  document.getElementById('totalScore').textContent = totalScore.toLocaleString();
  const isLast = currentRound === ROUNDS_PER_GAME - 1;
  document.getElementById('nextBtn').textContent = isLast ? 'See final score' : 'Next club →';
  updateDots(currentRound, true);
  document.getElementById('resultOverlay').classList.remove('hidden');
}

function nextRound() {
  document.getElementById('resultOverlay').classList.add('hidden');
  map.on('click', onMapClick);
  currentRound++;
  if (currentRound >= ROUNDS_PER_GAME) {
    showEndScreen();
  } else {
    loadRound();
  }
}

function showEndScreen() {
  const max = ROUNDS_PER_GAME * MAX_SCORE_PER_ROUND;
  const pct = Math.round((totalScore / max) * 100);
  const msg = pct >= 80 ? '⚽ Football geography genius!' :
              pct >= 55 ? '👏 Solid effort — you know your grounds.' :
              pct >= 30 ? '🗺️ Not bad, keep exploring.' :
                          '😬 Time to study some maps...';
  document.getElementById('finalScore').textContent = totalScore.toLocaleString();
  document.getElementById('finalSub').textContent = `${pct}% of possible points · ${msg}`;
  document.getElementById('endOverlay').classList.remove('hidden');
}

(function () {
  var bar = document.getElementById('progressBar');
  var lbl = document.getElementById('loadPct');
  fetch('clubs.json')
    .then(function (res) {
      var total = parseInt(res.headers.get('Content-Length') || '0', 10);
      var loaded = 0;
      var chunks = [];
      var reader = res.body.getReader();
      function pump() {
        return reader.read().then(function (x) {
          if (x.done) { return new Blob(chunks).text(); }
          chunks.push(x.value);
          loaded += x.value.length;
          if (total) {
            var pct = Math.round(loaded / total * 100);
            bar.style.width = pct + '%';
            lbl.textContent = pct + '%';
          }
          return pump();
        });
      }
      return pump();
    })
    .then(function (text) {
      ALL_CLUBS = JSON.parse(text);
      bar.style.width = '100%';
      lbl.textContent = '100%';
      setTimeout(function () {
        document.getElementById('loading').classList.add('hidden');
        initMap();
        startGame();
      }, 250);
    })
    .catch(function () {
      document.querySelector('#loading p').textContent = 'Failed to load — please refresh.';
    });
})();
</script>
</body>
</html>
