<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Overview</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>
    <h1>Traffic Overview</h1>
    <div id="debug" style="background: #f0f0f0; padding: 20px; margin: 20px; font-family: monospace;"></div>
    <div id="uniqueVisitors"></div>

    <script>
        const csvUrl = "https://raw.githubusercontent.com/palfsbg/mp-testing/main/traffic_overview.csv";

        Plotly.d3.csv(csvUrl, function(data) {
            // Debug: Show what we received
            document.getElementById('debug').innerHTML = `
                <strong>CSV loaded successfully!</strong><br>
                Rows found: ${data.length}<br>
                First row: ${JSON.stringify(data[0])}<br>
                Column names: ${Object.keys(data[0]).join(', ')}
            `;

            if (data.length === 0) {
                document.getElementById('debug').innerHTML += '<br><strong style="color:red;">ERROR: No data rows!</strong>';
                return;
            }
        });
    </script>
</body>
</html>
